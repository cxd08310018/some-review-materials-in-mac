<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vue</title>
    
</head>
<body>

    <div id="root">
        <h2>当前的n值是：<span v-text="n"></span></h2>
        <h2>放到10倍的n值是：<span v-cxd="n"></span></h2>
        <button click="n++"></button>
        <hr>
        <input type="text" v-cbind:value="n">
    </div>

    <script src="vue.js"></script>
    <script src="days.js"></script>
    <script>
    new Vue({
        el:'',
        data:{
            n:1
        },
        directives:{
            cxd(el,bd){
                el.innerText = bd.value * 10
            },
            cbind:{
                //指令与元素绑定成功的时候
                big(el,bd){
                    el.value = bd.value
                },
                inserted(el,bd){
                    el.focus()
                },
                update(el,bd){
                    el.value = bd.value
                }
            }
        }
    })    

    </script>

</body>
</html>
