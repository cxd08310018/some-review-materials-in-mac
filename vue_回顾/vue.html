<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vue</title>
    
</head>
<body>

    <div id="root">
        <h2 v-once>初始化的n值是{{n}}</h2>
        <h2>当前的n值是{{n}}</h2>
        <button @click="n++">点我n+1</button>
    </div>

    <script src="vue.js"></script>
    <script src="days.js"></script>
    <script>
    new Vue({
        el:'',
        data:{
            n:1
        }
    })    

    </script>

</body>
</html>
